<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurante</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f4f4;
}

/* HERO */
.hero {
  height: 60vh;
  background: url('https://images.unsplash.com/photo-1555992336-03a23c7b20ee') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 2rem;
  background: rgba(0,0,0,0.5);
  padding: 10px 20px;
  border-radius: 10px;
}

/* BUTTONS */
.buttons {
  text-align: center;
  margin: 20px;
}

.btn {
  display: inline-block;
  padding: 14px 20px;
  margin: 10px;
  border-radius: 25px;
  text-decoration: none;
  font-weight: bold;
  color: white;
}

.menu-btn { background: #e63946; }
.whatsapp-btn { background: #25D366; }

/* MENU */
#menuView {
  display: none;
  padding: 10px;
}

.category {
  margin-top: 20px;
  font-weight: bold;
  color: #e63946;
}

.item {
  background: white;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  animation: fadeIn 0.3s;
}

.food-img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
}

.price {
  float: right;
  font-weight: bold;
}

.desc {
  font-size: 0.85rem;
  color: #777;
}

/* BACK BUTTON */
.back {
  display: block;
  margin: 10px;
  text-align: center;
  font-weight: bold;
  cursor: pointer;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(5px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- HERO -->
<div id="homeView">
  <div class="hero">
    <h1 id="title">Cargando...</h1>
  </div>

  <div class="buttons">
    <a class="btn menu-btn" onclick="showMenu()">🍽 Ver Menú</a>
    <a id="waBtn" class="btn whatsapp-btn" href="#">📲 Contactar</a>
  </div>
</div>

<!-- MENU -->
<div id="menuView">
  <div class="back" onclick="goHome()">⬅ Volver</div>
  <div id="menuContent"></div>
</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTb39SKlhevlPEU-AAI6bcPdjRXsxRQrMRHp8AsLOUJ2hCh3fJkNFddg8C8tkbDgWTBFoZrh_VJjkX3/pub?output=csv";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let globalData = [];

// CSV parser
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const sep = lines[0].includes("\t") ? "\t" : ",";
  const rows = lines.map(l => l.split(sep));
  const headers = rows[0].map(h => h.trim().toLowerCase());

  return rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h,i) => obj[h] = (row[i] || "").trim());
    return obj;
  });
}

// Fetch data
fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const data = parseCSV(csv);
    globalData = data.filter(r => r.id && r.id.trim() === id);

    if (!globalData.length) {
      document.body.innerHTML = "Menú no encontrado";
      return;
    }

    init();
  });

// Init page
function init() {
  document.getElementById("title").innerText = globalData[0].name;

  // WhatsApp number (put in sheet later if you want)
  document.getElementById("waBtn").href = "https://wa.me/56912345678";
}

// Views
function showMenu() {
  document.getElementById("homeView").style.display = "none";
  document.getElementById("menuView").style.display = "block";
  renderMenu();
}

function goHome() {
  document.getElementById("menuView").style.display = "none";
  document.getElementById("homeView").style.display = "block";
}

// Render menu
function renderMenu() {
  const container = document.getElementById("menuContent");
  container.innerHTML = "";

  let currentCategory = "";

  globalData.forEach(i => {
    if (i.category !== currentCategory) {
      currentCategory = i.category;
      container.innerHTML += `<div class="category">${currentCategory}</div>`;
    }

    container.innerHTML += `
      <div class="item">
        ${i.image ? `<img src="${i.image}" class="food-img">` : ""}
        ${i.item}
        <span class="price">$${i.price}</span><br>
        <div class="desc">${i.description}</div>
      </div>
    `;
  });
}
</script>

</body>
</html>
