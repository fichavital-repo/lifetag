<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  padding: 10px;
}

.card {
  width: 100%;
  max-width: 380px;
  background: white;
  border-radius: 16px;
  padding: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.12);
}

/* TYPE COLORS */
.adult { border-top: 8px solid #e63946; }
.kid { border-top: 8px solid #3a86ff; }
.elder { border-top: 8px solid #2a9d8f; }

.name {
  font-size: 1.6rem;
  font-weight: 800;
  text-align: center;
}

.blood {
  display: block;
  text-align: center;
  background: #e63946;
  color: white;
  padding: 8px;
  border-radius: 10px;
  margin: 12px 0;
  font-size: 1.2rem;
  font-weight: bold;
}

.section {
  margin-top: 12px;
}

.label {
  font-size: 0.7rem;
  color: #777;
  text-transform: uppercase;
}

.value {
  font-size: 1.1rem;
  font-weight: bold;
}

.alert {
  background: #fff0f0;
  border-left: 5px solid #e63946;
  padding: 10px;
  border-radius: 6px;
  font-weight: bold;
  color: #b00020;
  margin-top: 4px;
}

.call {
  display: block;
  margin-top: 18px;
  background: #e63946;
  color: white;
  text-align: center;
  padding: 18px;
  border-radius: 12px;
  text-decoration: none;
  font-size: 1.2rem;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="app">Cargando ficha médica...</div>

<script>
const sheetURL = "PASTE_YOUR_CSV_LINK_HERE";

const params = new URLSearchParams(window.location.search);
const userId = params.get("id");

if (!userId) {
  document.getElementById("app").innerHTML = "ID no proporcionado";
}

fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.trim().split("\n").map(r => r.split(","));
    const headers = rows[0].map(h => h.trim());

    const data = rows.slice(1).map(row => {
      let obj = {};
      headers.forEach((h, i) => obj[h] = (row[i] || "").trim());
      return obj;
    });

    const user = data.find(u => u.id === userId);

    if (!user) {
      document.getElementById("app").innerHTML = "Usuario no encontrado";
      return;
    }

    render(user);
  })
  .catch(() => {
    document.getElementById("app").innerHTML = "Error cargando datos";
  });

function render(u) {
  let extra = "";

  // PRO + PREMIUM
  if (u.plan === "pro" || u.plan === "premium") {
    extra += `
      <div class="section">
        <div class="label">Condición</div>
        <div class="alert">${u.condition || "No especificado"}</div>
      </div>

      <div class="section">
        <div class="label">Alergias</div>
        <div class="alert">${u.allergy || "Ninguna"}</div>
      </div>
    `;
  }

  // PREMIUM ONLY
  if (u.plan === "premium") {
    extra += `
      <div class="section">
        <div class="label">Notas críticas</div>
        <div class="alert">${u.notes || "Sin notas"}</div>
      </div>
    `;
  }

  document.getElementById("app").innerHTML = `
    <div class="card ${u.type}">
      <div class="name">${u.name}</div>
      <div class="blood">${u.blood}</div>

      ${extra}

      <div class="section">
        <div class="label">Contacto de emergencia</div>
        <div class="value">${u.contact}</div>
      </div>

      <a href="tel:${u.phone}" class="call">📞 Llamar</a>
    </div>
  `;
}
</script>

</body>
</html>
