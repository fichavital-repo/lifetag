<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Actividades - Párvulos</title>
<style>
  :root {
    --primary: #4A90E2;
    --secondary: #F39C12;
    --bg: #f4f7f6;
    --card-bg: #ffffff;
    --text: #333333;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* HEADER */
  header {
    background: var(--primary);
    color: white;
    padding: 20px;
    text-align: center;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  header h1 {
    margin: 0;
    font-size: 1.8rem;
  }

  /* FILTERS */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 20px;
    justify-content: center;
    background: white;
    border-bottom: 1px solid #ddd;
  }

  select, input {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 1rem;
    flex: 1;
    min-width: 150px;
    max-width: 200px;
  }

  /* GRID DE ACTIVIDADES */
  .container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: auto;
  }

  .card {
    background: var(--card-bg);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    transition: transform 0.2s;
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 15px rgba(0,0,0,0.1);
  }

  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: #e0e0e0;
  }

  .card-content {
    padding: 15px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
  }

  .card-title {
    font-size: 1.2rem;
    font-weight: bold;
    color: var(--primary);
    margin-bottom: 10px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
  }

  .tag {
    background: #e1f0ff;
    color: #2b6cb0;
    font-size: 0.75rem;
    padding: 4px 8px;
    border-radius: 12px;
    font-weight: bold;
  }

  .tag.age { background: #fefcbf; color: #b7791f; }
  .tag.skill { background: #e6fffa; color: #285e61; }
  .tag.festivity { background: #fed7e2; color: #97266d; } /* Color para festividades */

  .description {
    font-size: 0.9rem;
    margin-bottom: 10px;
    flex-grow: 1;
  }

  .btn-link {
    display: block;
    text-align: center;
    background: var(--secondary);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-weight: bold;
    margin-top: auto;
    cursor: pointer;
    font-size: 1rem;
    width: 100%;
    box-sizing: border-box;
  }

  .btn-link:hover {
    background: #e67e22;
  }

  /* VISTA DETALLADA */
  #detailView {
    display: none;
    max-width: 800px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }

  .back-btn {
    background: #eee;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 20px;
    color: #555;
  }

  .back-btn:hover { background: #ddd; }

  .detail-image {
    width: 100%;
    max-height: 400px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 20px;
    background: #f0f0f0;
  }

  .detail-section {
    margin-bottom: 25px;
  }

  .detail-section h3 {
    color: var(--primary);
    border-bottom: 2px solid #eee;
    padding-bottom: 5px;
    margin-bottom: 15px;
  }

  .detail-section p {
    line-height: 1.6;
    color: #444;
    white-space: pre-wrap;
  }

  .materials-box {
    background: #fff3cd;
    padding: 15px;
    border-radius: 8px;
    border-left: 5px solid #ffc107;
    margin-bottom: 25px;
  }

  #loading {
    text-align: center;
    padding: 50px;
    font-size: 1.2rem;
    color: #666;
  }
</style>
</head>
<body>

<header>
  <h1>📚 Ideas y Actividades Párvulos</h1>
</header>

<div id="mainView">
  <div class="filters">
    <input type="text" id="searchInput" placeholder="Buscar actividad..." oninput="filterData()">
    <select id="themeFilter" onchange="filterData()">
      <option value="">Todos los Temas</option>
    </select>
    <select id="ageFilter" onchange="filterData()">
      <option value="">Todas las Edades</option>
    </select>
    <select id="skillFilter" onchange="filterData()">
      <option value="">Todas las Habilidades</option>
    </select>
    <select id="festivityFilter" onchange="filterData()">
      <option value="">Todas las Fechas / Festividades</option>
    </select>
  </div>

  <div id="loading">Cargando actividades...</div>
  <div id="activitiesGrid" class="container"></div>
</div>

<div id="detailView">
  <button class="back-btn" onclick="hideDetail()">⬅ Volver a las actividades</button>
  <div id="detailContent"></div>
</div>

<script>
// REEMPLAZA ESTA URL POR LA DE TU NUEVO GOOGLE SHEET PUBLICADO COMO CSV
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTb39SKlhevlPEU-AAI6bcPdjRXsxRQrMRHp8AsLOUJ2hCh3fJkNFddg8C8tkbDgWTBFoZrh_VJjkX3/pub?output=csv";

let allActivities = [];

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const rows = [];
  for (let i = 0; i < lines.length; i++) {
    const row = lines[i].match(/(?:\"([^\"]*)\")|([^\,]+)/g); 
    if(row) {
        rows.push(row.map(cell => {
            let clean = cell.trim();
            if (clean.startsWith('"') && clean.endsWith('"')) {
                clean = clean.slice(1, -1);
            }
            return clean;
        }));
    }
  }

  const headers = rows[0].map(h => h.toLowerCase());

  return rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h,i) => obj[h] = (row[i] || "").trim());
    return obj;
  }).filter(item => item.title);
}

fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    allActivities = parseCSV(csv);
    document.getElementById("loading").style.display = "none";
    populateFilters();
    renderActivities(allActivities);
  })
  .catch(err => {
    document.getElementById("loading").innerText = "Error cargando la base de datos.";
    console.error(err);
  });

function populateFilters() {
  const themes = new Set();
  const ages = new Set();
  const skills = new Set();
  const festivities = new Set();

  allActivities.forEach(act => {
    if (act.theme) themes.add(act.theme);
    if (act.age) ages.add(act.age);
    if (act.skills) {
      act.skills.split(',').forEach(s => skills.add(s.trim()));
    }
    if (act.festivity && act.festivity.toLowerCase() !== "ninguna" && act.festivity.trim() !== "") {
      festivities.add(act.festivity);
    }
  });

  fillSelect("themeFilter", Array.from(themes).sort());
  fillSelect("ageFilter", Array.from(ages).sort());
  fillSelect("skillFilter", Array.from(skills).sort());
  fillSelect("festivityFilter", Array.from(festivities).sort());
}

function fillSelect(id, optionsArray) {
  const select = document.getElementById(id);
  optionsArray.forEach(opt => {
    if (!opt) return;
    const option = document.createElement("option");
    option.value = opt;
    option.textContent = opt;
    select.appendChild(option);
  });
}

function filterData() {
  const searchText = document.getElementById("searchInput").value.toLowerCase();
  const theme = document.getElementById("themeFilter").value;
  const age = document.getElementById("ageFilter").value;
  const skill = document.getElementById("skillFilter").value;
  const festivity = document.getElementById("festivityFilter").value;

  const filtered = allActivities.filter(act => {
    const matchSearch = act.title.toLowerCase().includes(searchText) || act.description.toLowerCase().includes(searchText);
    const matchTheme = theme === "" || act.theme === theme;
    const matchAge = age === "" || act.age === age;
    const matchSkill = skill === "" || (act.skills && act.skills.includes(skill));
    
    // Lógica para festividades: si el filtro está vacío, muestra todas. Si tiene valor, debe coincidir.
    const matchFestivity = festivity === "" || act.festivity === festivity;

    return matchSearch && matchTheme && matchAge && matchSkill && matchFestivity;
  });

  renderActivities(filtered);
}

function renderActivities(data) {
  const container = document.getElementById("activitiesGrid");
  container.innerHTML = "";

  if (data.length === 0) {
    container.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>No se encontraron actividades.</p>";
    return;
  }

  data.forEach(act => {
    const imgHtml = act.image ? `<img src="${act.image}" alt="${act.title}" loading="lazy">` : '';
    const skillsHtml = act.skills ? act.skills.split(',').map(s => `<span class="tag skill">${s.trim()}</span>`).join('') : '';
    const festivityHtml = (act.festivity && act.festivity.toLowerCase() !== "ninguna" && act.festivity.trim() !== "") 
                          ? `<span class="tag festivity">🎉 ${act.festivity}</span>` : '';

    container.innerHTML += `
      <div class="card">
        ${imgHtml}
        <div class="card-content">
          <div class="card-title">${act.title}</div>
          <div class="tags">
            ${act.theme ? `<span class="tag">${act.theme}</span>` : ''}
            ${act.age ? `<span class="tag age">${act.age}</span>` : ''}
            ${festivityHtml}
            ${skillsHtml}
          </div>
          <div class="description">${act.description}</div>
          <button class="btn-link" onclick="showDetail('${act.id}')">Ver material completo</button>
        </div>
      </div>
    `;
  });
}

function showDetail(id) {
  const act = allActivities.find(a => a.id === id);
  if (!act) return;

  const detailContent = document.getElementById("detailContent");
  
  const imgHtml = act.image ? `<img src="${act.image}" class="detail-image" alt="${act.title}">` : '';
  const steps = act.steps ? act.steps : "Instrucciones no disponibles.";
  const benefits = act.benefits ? act.benefits : "Beneficios no disponibles.";
  const festivityHtml = (act.festivity && act.festivity.toLowerCase() !== "ninguna" && act.festivity.trim() !== "") 
                          ? `<span class="tag festivity">🎉 ${act.festivity}</span>` : '';
  
  detailContent.innerHTML = `
    ${imgHtml}
    <h2 style="color: var(--primary); margin-top: 0;">${act.title}</h2>
    
    <div class="tags" style="margin-bottom: 20px;">
      ${act.theme ? `<span class="tag">${act.theme}</span>` : ''}
      ${act.age ? `<span class="tag age">${act.age}</span>` : ''}
      ${festivityHtml}
      ${act.skills ? act.skills.split(',').map(s => `<span class="tag skill">${s.trim()}</span>`).join('') : ''}
    </div>

    ${act.materials ? `<div class="materials-box"><strong>✂️ Materiales Necesarios:</strong><br>${act.materials}</div>` : ''}

    <div class="detail-section">
      <h3>📝 Instrucciones Paso a Paso</h3>
      <p>${steps}</p>
    </div>

    <div class="detail-section">
      <h3>🧠 ¿Por qué funciona esto? (Beneficios)</h3>
      <p>${benefits}</p>
    </div>
  `;

  document.getElementById("mainView").style.display = "none";
  document.getElementById("detailView").style.display = "block";
  window.scrollTo(0, 0);
}

function hideDetail() {
  document.getElementById("detailView").style.display = "none";
  document.getElementById("mainView").style.display = "block";
}
</script>

</body>
</html>
